<button id="theme-toggle" class="theme-toggle-btn" aria-label="切换深色/浅色主题" title="切换主题">
  <!-- 浅色模式下显示月亮 → 点击切换至深色 -->
  <svg class="icon-sun" viewBox="0 0 24 24" width="20" height="20">
    <path fill="currentColor" d="M12 7a5 5 0 1 0 0 10 5 5 0 0 0 0-10zM12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
  </svg>
  <!-- 深色模式下显示太阳 → 点击切换至浅色 -->
  <svg class="icon-moon" viewBox="0 0 24 24" width="20" height="20">
    <path fill="currentColor" d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
  </svg>
</button>
