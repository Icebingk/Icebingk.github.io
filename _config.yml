# ============================================================
# Jekyll 站点配置
# 对应 GitHub Pages 仓库: <username>.github.io
# ============================================================

title:            "Icebingk"
tagline:          "FPGA · 嵌入式 · 电子设计"
description:      "个人技术博客与项目展示 — 集成电路专业，热爱嵌入式底层开发与软硬协同设计"
author:
  name:           "ADBD"
  email:          "z1520349663@163.com"
  github:         "Icebingk"

# 站点 URL（部署到 GitHub Pages 后生效）
url:              "https://icebingk.github.io"
baseurl:          ""

# 语言与时区（GitHub Pages 服务器为 UTC，本地 Windows 需配合 tzinfo-data gem）
lang:             "zh-CN"

# 分页（博客列表页为独立页面，此处关闭全局分页）
# 如未来需在首页分页，取消注释并搭配 jekyll-paginate 插件
# paginate:          5
# paginate_path:     "/blog/page:num/"

# 集合定义：项目展示
collections:
  projects:
    output: true
    permalink: /projects/:path/

# 默认 Front Matter
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: post
      author: "ADBD"
  - scope:
      path: ""
      type: "projects"
    values:
      layout: project
  - scope:
      path: ""
    values:
      layout: default

# Markdown 引擎
markdown: kramdown
kramdown:
  input: GFM
  syntax_highlighter: rouge

# 排除文件
exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - .gitignore
  - vendor/
