---
layout: default
---

<article class="project-detail">
  <header class="project-header">
    <h1>{{ page.title }}</h1>
    <div class="project-meta">
      {% if page.status %}
      <span class="project-status {{ page.status }}">{{ page.status }}</span>
      {% endif %}
      {% if page.github %}
      <a href="{{ page.github }}" target="_blank" rel="noopener" class="github-link">🔗 GitHub</a>
      {% endif %}
      {% if page.demo %}
      <a href="{{ page.demo }}" target="_blank" rel="noopener" class="demo-link">🌐 在线演示</a>
      {% endif %}
      {% if page.stars %}
      <span class="project-stars">⭐ {{ page.stars }}</span>
      {% endif %}
    </div>
  </header>

  <div class="project-content">
    {{ content }}
  </div>

  <footer class="project-footer">
    <a href="{{ '/projects' | relative_url }}" class="back-link">← 返回项目列表</a>
  </footer>
</article>
